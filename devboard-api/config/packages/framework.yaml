# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Note that the session will be started ONLY if you read or write from it.
    session: true

    rate_limiter:
        login:
            policy: fixed_window
            limit: 5
            interval: '1 minute'
        login_rate_limiter:
            policy: 'fixed_window'
            limit: 2
            interval: '15 minutes'
        main_rate_limiter:
            policy: 'fixed_window'
            limit: 2
            interval: '1 minute'
        authenticated_api:
            policy: 'sliding_window'
            limit: 2
            interval: '1 minute'

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
